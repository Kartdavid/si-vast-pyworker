name: Build GPU-masking image

# Builds the baked worker image (deps + models + code) and publishes it to GitHub's
# container registry as ghcr.io/kartdavid/si-gpu-masking:latest.
# Runs on every push to main, or manually from the Actions tab ("Run workflow").

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The image is ~13 GB with models baked in; clear the runner's preinstalled
      # toolchains to make room.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          df -h /

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/kartdavid/si-gpu-masking:latest
            ghcr.io/kartdavid/si-gpu-masking:${{ github.sha }}
